<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Student Feedback Form</title>
    <link rel="stylesheet" href="static/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Student Feedback</h1>
      <p class="confidentiality-note">
        Your feedback is treated as highly confidential and is intended only for review by the appropriate academic team.
      </p>

      <form id="feedbackForm">
        <label>
          Full name
          <input type="text" name="name" required />
        </label>

        <label>
          Email (optional)
          <input type="email" name="email" />
        </label>

        <label>
          Course / Subject
          <select name="course" required>
            <option value="">--</option>
            <option value="Artificial Intelligence &amp; Machine Learning">Artificial Intelligence &amp; Machine Learning</option>
            <option value="Cybersecurity">Cybersecurity</option>
            <option value="Cloud Computing">Cloud Computing</option>
            <option value="Digital Marketing">Digital Marketing</option>
            <option value="Blockchain Technology">Blockchain Technology</option>
            <option value="Robotics &amp; Automation">Robotics &amp; Automation</option>
            <option value="Biotechnology">Biotechnology</option>
          </select>
        </label>

        <section class="teacher-section" id="teacherSection">
          <div class="teacher-section-header">
            <strong>Teachers</strong>
            <p>Select one or more teachers for this course.</p>
          </div>
          <div id="teacherOptions" class="teacher-options"></div>
          <div id="teacherComments" class="teacher-comments"></div>
        </section>

        <label>
          Rating
          <select name="rating" required>
            <option value="">--</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Okay</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Very poor</option>
          </select>
        </label>

        <label>
          Comments
          <textarea name="comments" rows="4"></textarea>
        </label>

        <label class="checkbox">
          <input type="checkbox" name="consent" value="yes" required /> I agree to have my feedback stored (required for submission)
        </label>

        <div class="actions">
          <button type="submit">Submit feedback</button>
        </div>

        <div id="message" role="status" aria-live="polite"></div>
      </form>
    </main>

    <div class="popup-backdrop" id="popupBackdrop" hidden>
      <div class="popup-dialog" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
        <h3 id="popupTitle">Submission Status</h3>
        <p id="popupText"></p>
        <button type="button" id="popupOkButton" class="popup-ok-button">OK</button>
      </div>
    </div>

    <script src="static/js/script.js"></script>
  </body>
 </html>
